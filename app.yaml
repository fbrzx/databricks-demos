# Databricks Apps configuration.
# Docs: https://docs.databricks.com/aws/en/dev-tools/databricks-apps/

# The app is a single uvicorn process serving both the API and the built React
# frontend (frontend/dist). backend.run reads DATABRICKS_APP_PORT at runtime.
command:
  - python
  - -m
  - backend.run

env:
  - name: REPORT_MAX_PREVIEW_ROWS
    value: "100"

  # Injected from the Genie Space resource attached to this app.
  # Add the resource in the app's "Edit" screen: + Add resource > Genie Space,
  # with resource key "genie-space" and permission "Can run".
  - name: GENIE_SPACE_ID
    valueFrom: genie-space
